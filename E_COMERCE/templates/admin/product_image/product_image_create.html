{% extends 'admin/home.html' %}
{% load static %}
{% block title %}Create Product Image | E_COMERCE{% endblock %}
{% block content %}
<div class="mb-3 text-center">
    <h2 class="mb-4">Add Product Image</h2>
</div>
<div class="container" style="padding: 40px; max-width: 600px; background: whitesmoke; border-radius: 10px;">
    <form id="createImageForm" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label for="product_item" class="form-label">Product</label>
            <select class="form-control" id="product_item" name="product_item" required>
                <option value="">Select Product</option>
                {% for item in product_items %}
                <option value="{{ item.id }}">{{ item.product.name }} (ID: {{ item.id }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="photo" class="form-label">Image</label>
            <input type="file" class="form-control" id="photo" name="photo" accept="image/*" required>
            <div class="form-text">Upload product image (JPG, PNG, max 5MB recommended)</div>
            
            <!-- Image Preview Section -->
            <div id="imagePreviewContainer" class="mt-3" style="display: none;">
                <label class="form-label">Preview:</label>
                <div class="text-center p-3 border rounded bg-light">
                    <img id="imagePreview" src="" 
                         alt="Image Preview" 
                         style="max-width: 250px; max-height: 200px; object-fit: cover; border-radius: 8px; border: 2px solid #dee2e6;">
                    <div id="fileInfo" class="mt-2 small text-muted"></div>
                </div>
            </div>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="is_active" name="is_active" checked>
            <label class="form-check-label" for="is_active">Active Image</label>
        </div>
        <button type="submit" class="btn btn-primary">Create Image</button>
        <a href="{% url 'admin_productimage_list' %}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>

<script>
document.getElementById('createImageForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    
    const submitBtn = this.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating...';

    const formData = new FormData(this);

    try {
        const response = await fetch("{% url 'admin_productimage_create' %}", {
            method: "POST",
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').getAttribute('content')
            },
            body: formData
        });

        const result = await response.json();
        if (result.success) {
            window.location.href = "{% url 'admin_productimage_list' %}";
        } else {
            alert(result.error || "Failed to create image");
        }
    } catch (error) {
        alert("Error: " + error.message);
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Image';
    }
});

// ✅ IMAGE PREVIEW FUNCTIONALITY
document.getElementById('photo').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const previewContainer = document.getElementById('imagePreviewContainer');
    const previewImg = document.getElementById('imagePreview');
    const fileInfo = document.getElementById('fileInfo');
    
    if (file) {
        // Check file size (5MB limit)
        if (file.size > 5 * 1024 * 1024) {
            alert('File size too large! Please select an image under 5MB.');
            this.value = '';
            return;
        }
        
        // Check file type
        if (!file.type.startsWith('image/')) {
            alert('Please select a valid image file (JPG, PNG, etc.).');
            this.value = '';
            return;
        }
        
        // Show preview
        previewContainer.style.display = 'block';
        
        // Create object URL for preview
        const reader = new FileReader();
        reader.onload = function(e) {
            previewImg.src = e.target.result;
        };
        reader.readAsDataURL(file);
        
        // Show file info
        const fileSize = (file.size / 1024 / 1024).toFixed(2);
        fileInfo.innerHTML = `
            <strong>${file.name}</strong><br>
            Size: ${fileSize} MB | Type: ${file.type}
        `;
        
    } else {
        // Hide preview if no file
        previewContainer.style.display = 'none';
    }
});
</script>
{% endblock %}
